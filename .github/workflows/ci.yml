name: Auto-Pack

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyinstaller
          pip3 install -r requirements.txt

      - name: Pack to exe
        run: |
          mkdir build
          pyinstaller -F main.py
          mv dist/*.exe build/
          mv README.md build/
          mv setting.yaml build/
          mv des.min.js build/
          Compress-Archive -Path build -DestinationPath build.zip

      - name: Get commit info
        id: commit
        run: |
          echo "short=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT
          echo "title=$(git log -1 --pretty=%s)" >> $env:GITHUB_OUTPUT

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: build
          path: build.zip

      - name: Create Pre-release And Upload Asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build.zip
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true
          release_name: ${{ steps.commit.outputs.title }}
          body: |
            ${{ github.event.head_commit.message }}
          prerelease: true